name: "Chrístes"
description: 'Chrístes, dal greco utenti, è un modulo Drupal per la gestione degli utenti della scuola'
package: "Neapoli"
version: 1.0.2

type: module
core_version_requirement: ^10.3 || ^11
dependencies:
  - drupal:user
  - auto_username:auto_username
  - conditional_fields:conditional_fields
  - login_emailusername:login_emailusername
