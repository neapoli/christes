langcode: it
cancel_confirm:
  subject: 'Richiesta rimozione profilo per [user:display-name] su [site:name]'
  body: "[user:display-name]\r\n\r\nA request to cancel your account has been made at [site:name].\r\n\r\nYou may now cancel your account on [site:url-brief] by clicking this link or copying and pasting it into your browser:\r\n\r\n[user:cancel-url]\r\n\r\nNOTE: The cancellation of your account is not reversible.\r\n\r\nThis link expires in one day and nothing will happen if it is not used.\r\n\r\n--  [site:name] team"
password_reset:
  subject: 'Informazioni di autenticazione sostitutive per [user:field_cognome] [user:field_nome] su [site:name]'
  body: "[user:field_nome] [user:field_cognome],\r\n\r\nUna richiesta di reimpostazione password è stata effettuata per il tuo profilo su [site:name]. <br><br>\r\n\r\nPuoi autenticarti con un clic su questo collegamento oppure copiando ed incollando il collegamento nel tuo browser:<br><br>\r\n\r\n[user:one-time-login-url] <br><br>\r\n\r\nQuesto collegamento può essere usato solo una volta per l'autenticazione e ti consentirà di scegliere la tua password. Il collegamento scadrà dopo un giorno e niente sarà modificato se non utilizzato. <br><br>\r\n\r\n-- Il team di [site:name] <br><br> \r\n\r\n<strong>Attenzione: questa posta elettronica non è abilitata a ricevere messaggi.</strong>"
register_admin_created:
  subject: 'Credenziali di Accesso per [site:name]'
  body: "Gentile <strong>[user:field_nome] [user:field_cognome], </strong><br><br>\r\n\r\nUn amministratore ha creato il tuo profilo utente sul sito \"[site:name]\". <br><br> \r\n\r\nPuoi autenticarti con un clic su questo collegamento oppure copiando ed incollando il collegamento nel tuo browser:<br><br> \r\n\r\n[user:one-time-login-url] <br><br>\r\n\r\nQuesto collegamento può essere usato solo una volta per l'autenticazione e ti consentirà di scegliere la tua password.<br><br> \r\n\r\nDopo aver scelto la password, in futuro, per autenticarti su  [site:login-url] dovrai usare:<br><br> \r\n\r\nNomeUtente: [user:account-name] oppure Indirizzo mail: [user:mail]<br/>\r\nPassword: La password scelta da te <br><br> \r\n\r\n-- Il team di [site:name] <br><br> \r\n\r\n<strong>Attenzione: questa posta elettronica non è abilitata a ricevere messaggi.</strong>"
register_no_approval_required:
  subject: 'Dettagli profilo per [user:display-name] su [site:name]'
  body: "[user:display-name],\r\n\r\nThank you for registering at [site:name]. You may now log in by clicking this link or copying and pasting it into your browser:\r\n\r\n[user:one-time-login-url]\r\n\r\nThis link can only be used once to log in and will lead you to a page where you can set your password.\r\n\r\nAfter setting your password, you will be able to log in at [site:login-url] in the future using:\r\n\r\nusername: [user:name]\r\npassword: Your password\r\n\r\n--  [site:name] team"
register_pending_approval:
  subject: "Dettagli del profilo per [user:display-name] su [site:name] (in attesa dell'approvazione dell'amministratore)"
  body: "[user:display-name],\r\n\r\nThank you for registering at [site:name]. Your application for an account is currently pending approval. Once it has been approved, you will receive another email containing information about how to log in, set your password, and other details.\r\n\r\n--  [site:name] team"
register_pending_approval_admin:
  subject: "Dettagli del profilo per [user:display-name] su [site:name] (in attesa dell'approvazione dell'amministratore)"
  body: "[user:display-name] has applied for an account.\r\n\r\n[user:edit-url]"
status_activated:
  subject: 'Dettagli profilo per [user:field_cognome] [user:field_nome] su [site:name] (attivato)'
  body: "[user:field_cognome] [user:field_nome],\r\n\r\nIl tuo account su [site:name] è stato attivato. <br><br> \r\n\r\nPuoi autenticarti con un clic su questo collegamento oppure copiando ed incollando il collegamento nel tuo browser:<br><br> \r\n\r\n[user:one-time-login-url] <br><br>\r\n\r\nQuesto collegamento può essere usato solo una volta per l'autenticazione e ti consentirà di scegliere la tua password.<br><br> \r\n\r\nDopo aver scelto la password, in futuro, per autenticarti su  [site:login-url] dovrai usare:<br><br> \r\n\r\nNomeUtente: [user:account-name] oppure Indirizzo mail: [user:mail]<br/>\r\nPassword: La password scelta da te <br><br> \r\n\r\n-- Il team di [site:name] <br><br> \r\n\r\n<strong>Attenzione: questa posta elettronica non è abilitata a ricevere messaggi.</strong>"
status_blocked:
  subject: 'Dettagli profilo per [user:display-name] su [site:name] (bloccato)'
  body: "[user:field_nome] [user:field_cognome],\r\n\r\nIl tuo account su [site:name] è stato bloccato per scadenza contratto o per un altro motivo. <br><br> \r\n\r\nSe ritieni che sia stato un errore, rivolgiti in segreteria per lo sblocco. <br><br>\r\n\r\n--  [site:name] team"
status_canceled:
  subject: 'Dettagli profilo per [user:display-name] su [site:name] (eliminato)'
  body: "[user:display-name],\r\n\r\nIl tuo profilo su [site:name] è stato eliminato.\r\n\r\n--  Il team [site:name]"
